<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أسئلة سنوات — Networks & Data Transmissions</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="responsive.css">
  <style>
    :root {
      --navy: #07111f;
      --deep: #0b1a2e;
      --mid-blue: #102340;
      --card-bg: rgba(16,35,64,.6);
      --border: rgba(0,200,255,.18);
      --accent: #00c8ff;
      --accent2: #ff6b35;
      --gold: #ffc940;
      --green: #3effa0;
      --red: #ff5f6d;
      --purple: #b48aff;
      --text: #dce8f5;
      --muted: #7d93ad;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Cairo,sans-serif;background:var(--navy);color:var(--text);line-height:1.7;overflow-x:hidden}

    #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5}

    /* NAV */
    .top-nav{position:sticky;top:0;z-index:999;background:rgba(7,17,31,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    .top-nav a{text-decoration:none;color:var(--text);border:1px solid var(--border);background:rgba(16,35,64,.75);padding:6px 14px;border-radius:9px;font-size:13px;font-weight:700;transition:.2s}
    .top-nav a:hover,.top-nav a.active{color:var(--navy);background:var(--accent);border-color:var(--accent);box-shadow:0 0 14px rgba(0,200,255,.4)}

    /* HERO */
    .hero{position:relative;z-index:1;padding:60px 24px 40px;text-align:center;border-bottom:1px solid var(--border);background:linear-gradient(160deg,#07111f,#0b1a2e 50%,#130c30)}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,200,255,.15),transparent 70%);pointer-events:none}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--accent);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:2px;padding:5px 20px;border-radius:30px;margin-bottom:18px;text-transform:uppercase;background:rgba(0,200,255,.07)}
    .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
    .hero h1{font-family:Syne,sans-serif;font-size:clamp(1.8rem,5vw,3.2rem);font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:8px}
    .hero h1 span{color:var(--accent)}
    .hero .ar-sub{color:var(--gold);font-size:1rem;margin-bottom:20px}

    /* SCORE BOARD */
    .scoreboard{position:relative;z-index:1;max-width:900px;margin:28px auto 0;padding:0 20px}
    .score-card{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:24px 28px;backdrop-filter:blur(10px);display:flex;align-items:center;gap:24px;flex-wrap:wrap}
    .score-ring{position:relative;width:110px;height:110px;flex-shrink:0}
    .score-ring svg{transform:rotate(-90deg);width:110px;height:110px}
    .score-ring .track{fill:none;stroke:rgba(0,200,255,.1);stroke-width:8}
    .score-ring .fill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s ease;stroke-dasharray:283;stroke-dashoffset:283}
    .score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .score-pct{font-family:Syne,sans-serif;font-size:1.5rem;font-weight:800;color:#fff}
    .score-label{font-size:10px;color:var(--muted)}
    .score-stats{display:flex;gap:20px;flex-wrap:wrap;flex:1}
    .stat-item{text-align:center}
    .stat-item .val{font-family:Syne,sans-serif;font-size:1.8rem;font-weight:800;line-height:1}
    .stat-item .lbl{font-size:11px;color:var(--muted)}
    .val.correct{color:var(--green)}
    .val.wrong{color:var(--red)}
    .val.skip{color:var(--gold)}
    .val.total{color:var(--accent)}
    .progress-bar{height:6px;background:rgba(0,200,255,.1);border-radius:10px;margin-top:16px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:10px;transition:width .5s ease;width:0%}
    .score-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
    .btn{padding:9px 22px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;border:none;font-family:Cairo,sans-serif;transition:.2s}
    .btn-accent{background:var(--accent);color:var(--navy)}
    .btn-accent:hover{box-shadow:0 4px 20px rgba(0,200,255,.4);transform:translateY(-2px)}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
    .btn-red{background:rgba(255,95,109,.15);border:1px solid rgba(255,95,109,.4);color:var(--red)}
    .btn-red:hover{background:rgba(255,95,109,.25)}

    /* FILTERS */
    .filters{position:relative;z-index:1;max-width:900px;margin:20px auto 0;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .filter-btn{padding:6px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:rgba(16,35,64,.7);color:var(--muted);font-family:Cairo,sans-serif;transition:.2s}
    .filter-btn.active{background:rgba(0,200,255,.15);border-color:var(--accent);color:var(--accent)}
    .search-box{flex:1;min-width:180px;background:rgba(16,35,64,.7);border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text);font-family:Cairo,sans-serif;font-size:13px;outline:none}
    .search-box:focus{border-color:var(--accent)}
    .search-box::placeholder{color:var(--muted)}
    .chapter-filter{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:rgba(16,35,64,.7);color:var(--text);font-family:Cairo,sans-serif;outline:none}
    .chapter-filter:focus{border-color:var(--accent)}

    /* QUESTIONS */
    .questions-wrap{position:relative;z-index:1;max-width:900px;margin:24px auto 60px;padding:0 20px}
    .q-card{background:var(--card-bg);border:1px solid var(--border);border-radius:18px;padding:24px 26px;margin-bottom:16px;backdrop-filter:blur(6px);transition:.3s;animation:fadeUp .5s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .q-card.answered-correct{border-color:rgba(62,255,160,.4);background:rgba(62,255,160,.04)}
    .q-card.answered-wrong{border-color:rgba(255,95,109,.4);background:rgba(255,95,109,.04)}
    .q-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px}
    .q-num{width:38px;height:38px;background:var(--accent);color:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0;font-family:Syne,sans-serif}
    .q-num.correct-num{background:var(--green)}
    .q-num.wrong-num{background:var(--red)}
    .q-chapter-tag{font-size:10px;font-weight:700;color:var(--purple);background:rgba(180,138,255,.1);border:1px solid rgba(180,138,255,.2);padding:2px 8px;border-radius:5px;margin-bottom:4px;display:inline-block}
    .q-text{font-size:14.5px;font-weight:600;color:#fff;line-height:1.6;flex:1}
    .options{display:flex;flex-direction:column;gap:8px}
    .option{display:flex;align-items:center;gap:12px;padding:11px 16px;background:rgba(16,35,64,.5);border:1px solid rgba(0,200,255,.1);border-radius:10px;cursor:pointer;transition:.2s;font-size:13.5px;text-align:right;direction:ltr}
    .option:hover:not(.disabled){background:rgba(0,200,255,.1);border-color:rgba(0,200,255,.3);transform:translateX(-3px)}
    .option.disabled{cursor:default}
    .option-letter{width:28px;height:28px;border-radius:7px;background:rgba(0,200,255,.1);border:1px solid rgba(0,200,255,.2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--accent);flex-shrink:0;font-family:Syne,sans-serif;transition:.2s}
    .option.selected .option-letter{background:var(--accent);color:var(--navy)}
    .option.correct-opt{background:rgba(62,255,160,.1)!important;border-color:rgba(62,255,160,.4)!important}
    .option.correct-opt .option-letter{background:var(--green);color:var(--navy)}
    .option.wrong-opt{background:rgba(255,95,109,.1)!important;border-color:rgba(255,95,109,.4)!important}
    .option.wrong-opt .option-letter{background:var(--red);color:#fff}
    .option.show-correct{background:rgba(62,255,160,.08)!important;border-color:rgba(62,255,160,.3)!important;animation:pulse-border .8s ease}
    .option.show-correct .option-letter{background:var(--green);color:var(--navy)}
    @keyframes pulse-border{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px rgba(62,255,160,.4)}}

    /* FEEDBACK */
    .feedback{margin-top:14px;border-radius:12px;padding:14px 18px;font-size:13.5px;line-height:1.7;display:none}
    .feedback.show{display:block;animation:fadeUp .4s ease}
    .feedback.correct-fb{background:rgba(62,255,160,.08);border:1px solid rgba(62,255,160,.3)}
    .feedback.wrong-fb{background:rgba(255,95,109,.08);border:1px solid rgba(255,95,109,.3)}
    .fb-header{font-weight:800;font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
    .fb-correct-head{color:var(--green)}
    .fb-wrong-head{color:var(--red)}
    .fb-explain{color:var(--text);direction:rtl;text-align:right}
    .fb-correct-ans{margin-top:8px;background:rgba(62,255,160,.1);border:1px solid rgba(62,255,160,.2);border-radius:8px;padding:8px 12px;font-weight:700;color:var(--green)}

    /* EMPTY STATE */
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state .big{font-size:3rem;margin-bottom:12px}

    /* RESULTS MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.3s}
    .modal-overlay.show{opacity:1;pointer-events:all}
    .modal{background:var(--deep);border:1px solid var(--border);border-radius:24px;padding:36px;max-width:460px;width:100%;text-align:center;transform:scale(.9);transition:.3s;position:relative}
    .modal-overlay.show .modal{transform:scale(1)}
    .modal h2{font-family:Syne,sans-serif;font-size:1.8rem;color:#fff;margin-bottom:6px}
    .modal .grade{font-size:4rem;font-weight:900;font-family:Syne,sans-serif;margin:16px 0}
    .modal .grade.A{color:var(--green)}
    .modal .grade.B{color:var(--accent)}
    .modal .grade.C{color:var(--gold)}
    .modal .grade.D{color:var(--red)}
    .modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:20px 0}
    .modal-stat{background:rgba(16,35,64,.8);border:1px solid var(--border);border-radius:12px;padding:14px}
    .modal-stat .ms-val{font-family:Syne,sans-serif;font-size:1.5rem;font-weight:800}
    .modal-stat .ms-lbl{font-size:11px;color:var(--muted)}
    .modal-msg{font-size:14px;color:var(--muted);margin-bottom:24px;direction:rtl}

    /* STICKY MINI SCORE */
    .mini-score{position:fixed;bottom:20px;right:20px;z-index:500;background:rgba(7,17,31,.95);border:1px solid var(--border);border-radius:14px;padding:10px 16px;backdrop-filter:blur(10px);display:flex;gap:14px;align-items:center;font-size:13px}
    .ms-c{color:var(--green);font-weight:800}
    .ms-w{color:var(--red);font-weight:800}
    .ms-t{color:var(--muted)}

    /* RESPONSIVE */
    @media(max-width:600px){
      .score-card{flex-direction:column;text-align:center}
      .score-stats{justify-content:center}
      .hero h1{font-size:1.8rem}
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- NAV -->
<nav class="top-nav">
  <a href="index.html">🏠 Home</a>
  <a href="chapter1.html">CH 1</a>
  <a href="chapter2.html">CH 2</a>
  <a href="chapter3.html">CH 3</a>
  <a href="chapter4.html">CH 4</a>
  <a href="chapter5.html">CH 5</a>
  <a href="chapter6.html">CH 6</a>
  <a href="exam.html" class="active">📝 أسئلة سنوات</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-badge"><span class="dot"></span> Banks of Questions — سنوات سابقة</div>
  <h1>أسئلة <span>السنوات السابقة</span></h1>
  <div class="ar-sub">امتحن نفسك — اختر الإجابة واعرف نتيجتك فوراً مع الشرح</div>
</section>

<!-- SCOREBOARD -->
<div class="scoreboard">
  <div class="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 100 100">
        <circle class="track" cx="50" cy="50" r="45"/>
        <circle class="fill" id="ringFill" cx="50" cy="50" r="45"/>
      </svg>
      <div class="score-center">
        <div class="score-pct" id="scorePct">0%</div>
        <div class="score-label">النسبة</div>
      </div>
    </div>
    <div style="flex:1">
      <div class="score-stats">
        <div class="stat-item"><div class="val correct" id="countCorrect">0</div><div class="lbl">✅ صحيح</div></div>
        <div class="stat-item"><div class="val wrong" id="countWrong">0</div><div class="lbl">❌ خطأ</div></div>
        <div class="stat-item"><div class="val skip" id="countSkip">0</div><div class="lbl">⏭ متبقي</div></div>
        <div class="stat-item"><div class="val total" id="countTotal">0</div><div class="lbl">📋 الكل</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
      <div class="score-actions">
        <button class="btn btn-accent" onclick="showResults()">📊 النتيجة النهائية</button>
        <button class="btn btn-ghost" onclick="resetAll()">🔄 إعادة التشغيل</button>
        <button class="btn btn-ghost" onclick="shuffleQuestions()">🔀 تبديل الترتيب</button>
      </div>
    </div>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" onclick="filterCat('all',this)">الكل</button>
  <button class="filter-btn" onclick="filterCat('wrong',this)">❌ أخطائي فقط</button>
  <button class="filter-btn" onclick="filterCat('unanswered',this)">⏳ غير مجاوب</button>
  <button class="filter-btn" onclick="filterCat('correct',this)">✅ الصحيحة</button>
  <select class="chapter-filter" onchange="filterChapter(this.value)">
    <option value="all">كل الفصول</option>
    <option value="CH1">Chapter 1 — Intro</option>
    <option value="CH2">Chapter 2 — TCP/OSI</option>
    <option value="CH3">Chapter 3 — App Layer</option>
    <option value="CH4">Chapter 4 — Transport</option>
    <option value="CH5">Chapter 5 — IPv4</option>
    <option value="CH6">Chapter 6 — Access</option>
  </select>
  <input class="search-box" type="text" placeholder="🔍 ابحث عن سؤال..." oninput="searchQ(this.value)">
</div>

<!-- QUESTIONS CONTAINER -->
<div class="questions-wrap" id="questionsWrap"></div>

<!-- MINI SCORE -->
<div class="mini-score">
  <span>✅ <span class="ms-c" id="msC">0</span></span>
  <span>❌ <span class="ms-w" id="msW">0</span></span>
  <span class="ms-t">من <span id="msT">0</span></span>
</div>

<!-- RESULTS MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div style="font-size:2.5rem;margin-bottom:8px" id="modalEmoji">🎓</div>
    <h2>نتيجتك النهائية</h2>
    <div class="grade" id="modalGrade">A+</div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="ms-val" style="color:var(--green)" id="mCorrect">0</div><div class="ms-lbl">✅ صحيح</div></div>
      <div class="modal-stat"><div class="ms-val" style="color:var(--red)" id="mWrong">0</div><div class="ms-lbl">❌ خطأ</div></div>
      <div class="modal-stat"><div class="ms-val" style="color:var(--gold)" id="mSkip">0</div><div class="ms-lbl">⏭ متبقي</div></div>
    </div>
    <div class="modal-msg" id="modalMsg">ممتاز! أداء رائع</div>
    <button class="btn btn-accent" style="width:100%;margin-bottom:10px" onclick="closeModal()">متابعة المراجعة</button>
    <button class="btn btn-ghost" style="width:100%" onclick="resetAll();closeModal()">🔄 إعادة من البداية</button>
  </div>
</div>

<script>
// ── PARTICLE BG ──
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W,H,particles=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
function makeP(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.3,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,o:Math.random()*.4+.1}}
function initP(){particles=Array.from({length:80},makeP)}
function drawP(){
  ctx.clearRect(0,0,W,H);
  particles.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(0,200,255,${p.o})`;ctx.fill();
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
  });
  for(let i=0;i<particles.length;i++)for(let j=i+1;j<particles.length;j++){
    const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<90){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(0,200,255,${.06*(1-d/90)})`;ctx.lineWidth=.4;ctx.stroke()}
  }
  requestAnimationFrame(drawP);
}
resize();initP();drawP();
window.addEventListener('resize',()=>{resize();initP()});

// ── QUESTIONS DATA ──
const QUESTIONS = [
  // ═══ CHAPTER 1 — Intro to Networks ═══
  {id:1,ch:'CH1',q:'______ refers to the structure or format of the data, meaning the order in which they are presented.',opts:['Semantics','Syntax','Timing','All of the above'],ans:1,explain:'Syntax = هيكل البيانات وترتيبها. Semantics = المعنى. Timing = التوقيت.'},
  {id:2,ch:'CH1',q:'______ is a data communication system spanning states, countries, or the whole world.',opts:['MAN','LAN','WAN','None of the above'],ans:2,explain:'WAN = Wide Area Network تمتد لمسافات كبيرة عبر الدول. LAN = محلية. MAN = مدينة.'},
  {id:3,ch:'CH1',q:'The physical path over which a message travels is called:',opts:['Protocol','Medium','Signal','All of the above'],ans:1,explain:'Medium = الوسط الفيزيائي (السلك أو الهواء) الذي تنتقل عبره البيانات.'},
  {id:4,ch:'CH1',q:'A television broadcast is an example of ______ transmission.',opts:['Simplex','Half-duplex','Full-duplex','Automatic'],ans:0,explain:'Simplex = اتجاه واحد فقط. التلفزيون يبث ولا يستقبل من المشاهد.'},
  {id:5,ch:'CH1',q:'The network criteria (standards) include:',opts:['Performance','Reliability','Security','All of the above'],ans:3,explain:'معايير الشبكة تشمل: الأداء Performance، الموثوقية Reliability، والأمان Security.'},
  {id:6,ch:'CH1',q:'Communication means sharing information. This sharing can be:',opts:['Locally','Remotely','Locally or remotely','None'],ans:2,explain:'الاتصال قد يكون داخل نفس الموقع (محلياً) أو عبر مسافات بعيدة (بعيداً).'},
  {id:7,ch:'CH1',q:'Propagation Delay equals:',opts:['Distance / Propagation Speed','Propagation Speed / Distance','Packet Length / Bandwidth','Bandwidth / Packet Length'],ans:0,explain:'زمن الانتشار = المسافة ÷ سرعة الانتشار. كلما زادت المسافة زاد التأخير.'},
  {id:8,ch:'CH1',q:'In Computer Networks, a sequence of bits in the encoding system is called:',opts:['HTTP','SMTP','ASCII','FTP'],ans:2,explain:'ASCII = American Standard Code for Information Interchange، نظام ترميز الحروف بالبتات.'},
  {id:9,ch:'CH1',q:'Network performance is related to:',opts:['Transit Time only','Response Time only','Transit Time and Response Time','None'],ans:2,explain:'أداء الشبكة يقاس بـ Transit Time (وقت النقل) و Response Time (وقت الاستجابة) معاً.'},
  {id:10,ch:'CH1',q:'The direction of data flow in Half-Duplex is:',opts:['One direction only','Both directions simultaneously','Both directions but not simultaneously','None'],ans:2,explain:'Half-Duplex = الاتجاهين لكن ليس في نفس الوقت. مثل اللاسلكي (راديو الشرطة).'},
  {id:11,ch:'CH1',q:'Which topology requires a central controller or hub?',opts:['Mesh','Star','Bus','Ring'],ans:1,explain:'Star topology = كل الأجهزة متصلة بـ hub أو switch مركزي.'},
  {id:12,ch:'CH1',q:'Which topology has the highest reliability?',opts:['Bus','Star','Mesh','Ring'],ans:2,explain:'Mesh topology = كل جهاز متصل بجميع الأجهزة الأخرى، مما يعطي أعلى موثوقية.'},
  {id:13,ch:'CH1',q:'Which topology requires the most cabling?',opts:['Mesh','Bus','Ring','Star'],ans:0,explain:'Mesh يحتاج n(n-1)/2 كابل، أكثر من أي topology أخرى.'},
  {id:14,ch:'CH1',q:'Which topology is easiest to install?',opts:['Bus','Mesh','Ring','Hybrid'],ans:0,explain:'Bus topology هي الأسهل في التركيب — كابل واحد يربط الجميع.'},
  {id:15,ch:'CH1',q:'Which topology has no central controller?',opts:['Bus','Star','Hub','Switch'],ans:0,explain:'Bus topology ليس فيها controller مركزي، الكل متصل بنفس الكابل المشترك.'},
  {id:16,ch:'CH1',q:'Advantage of Bus topology:',opts:['Easy fault isolation','Easy adding device','Easy installation','All'],ans:2,explain:'ميزة Bus الرئيسية هي سهولة التركيب، لكن يصعب عزل الأخطاء فيها.'},
  {id:17,ch:'CH1',q:'Fiber Optic provides:',opts:['Highest bandwidth','Lowest bandwidth','Electrical signals only','Radio waves'],ans:0,explain:'الألياف الضوئية توفر أعلى bandwidth وأسرع نقل للبيانات مقارنة بأي وسيط آخر.'},
  {id:18,ch:'CH1',q:'UTP stands for:',opts:['Unshielded Twisted Pair','Unified Transfer Protocol','Universal Twisted Pair','None'],ans:0,explain:'UTP = Unshielded Twisted Pair، أسلاك ملتوية غير محمية، الأكثر شيوعاً في الشبكات المحلية.'},
  {id:19,ch:'CH1',q:'Security in network criteria means:',opts:['High throughput','Error free transfer','Protection against unauthorized access','Low delay'],ans:2,explain:'الأمان Security = حماية البيانات من الوصول غير المصرح به.'},
  {id:20,ch:'CH1',q:'Full Duplex means:',opts:['One-way communication','Both directions simultaneously','Alternate directions','None'],ans:1,explain:'Full-Duplex = الإرسال والاستقبال في نفس الوقت. مثل المكالمة الهاتفية.'},
  {id:21,ch:'CH1',q:'Simplex means:',opts:['One-way communication only','Two-way simultaneous','Two-way alternate','None'],ans:0,explain:'Simplex = اتجاه واحد فقط، المرسل يرسل والمستقبل يستقبل فقط.'},
  {id:22,ch:'CH1',q:'Jitter means:',opts:['Delay variation','Throughput','Routing','Error'],ans:0,explain:'Jitter = تذبذب التأخير — الفرق في وقت وصول الحزم المتتالية.'},
  {id:23,ch:'CH1',q:'Timeliness means:',opts:['Data arrives on time','Data encrypted','Data compressed','Data routed'],ans:0,explain:'Timeliness = وصول البيانات في الوقت المناسب، مهم جداً في البث المباشر والصوت.'},
  {id:24,ch:'CH1',q:'Accuracy means:',opts:['Sending data without errors','Sending data with errors','None','All'],ans:0,explain:'Accuracy = الدقة في نقل البيانات بدون أخطاء.'},
  {id:25,ch:'CH1',q:'Packet switching:',opts:['Sends whole message without division','Divides data into packets','Requires dedicated path','Uses circuit only'],ans:1,explain:'Packet switching = تقسيم البيانات إلى حزم packets وإرسالها عبر الشبكة.'},
  // ═══ CHAPTER 2 — Network Models ═══
  {id:26,ch:'CH2',q:'Why was the OSI model developed?',opts:['Manufacturers disliked TCP/IP','Need for data transfer was increasing','Standards were needed to allow any two systems to communicate','None of the above'],ans:2,explain:'OSI طُوِّر لإنشاء معايير تسمح لأي نظامين بالتواصل بغض النظر عن الشركة المصنعة.'},
  {id:27,ch:'CH2',q:'Which layer in the Internet model is the network support layer?',opts:['Application','Transport','Data Link','Network'],ans:2,explain:'Data Link Layer هي طبقة دعم الشبكة في نموذج الإنترنت.'},
  {id:28,ch:'CH2',q:'What are the responsibilities of the Application Layer?',opts:['Dividing message into manageable segments','Enables user access to the network','User interfaces and support for services','B and C'],ans:3,explain:'Application Layer تتيح وصول المستخدم للشبكة وتوفر واجهات المستخدم والخدمات.'},
  {id:29,ch:'CH2',q:'A bridge operates in the ______ layer.',opts:['Physical','Network','Data Link','None of the above'],ans:2,explain:'Bridge يعمل في Data Link Layer (Layer 2) ويستخدم MAC addresses.'},
  {id:30,ch:'CH2',q:'A repeater operates in the ______ layer.',opts:['Physical','Data Link','Network','All of the above'],ans:0,explain:'Repeater يعمل في Physical Layer (Layer 1) ويقوم فقط بتضخيم الإشارة.'},
  {id:31,ch:'CH2',q:'The Internet model consists of:',opts:['3 layers','4 layers','5 layers','7 layers'],ans:1,explain:'نموذج الإنترنت (TCP/IP) يتكون من 4 طبقات: Application, Transport, Network, Data Link+Physical.'},
  {id:32,ch:'CH2',q:'Which OSI layer is responsible for routing?',opts:['Data Link','Network','Transport','Physical'],ans:1,explain:'Network Layer (Layer 3) مسؤولة عن التوجيه routing وإيجاد المسار بين الشبكات.'},
  {id:33,ch:'CH2',q:'Which layer provides process-to-process delivery?',opts:['Application','Transport','Data Link','Physical'],ans:1,explain:'Transport Layer توفر التوصيل من عملية إلى عملية (process-to-process).'},
  {id:34,ch:'CH2',q:'Which layer provides node-to-node delivery?',opts:['Data Link','Transport','Network','Application'],ans:0,explain:'Data Link Layer توفر التوصيل من عقدة إلى عقدة (node-to-node) في نفس الشبكة.'},
  {id:35,ch:'CH2',q:'Which layer provides host-to-host delivery?',opts:['Data Link','Network','Application','Session'],ans:1,explain:'Network Layer توفر التوصيل من مضيف إلى مضيف (host-to-host) عبر شبكات مختلفة.'},
  {id:36,ch:'CH2',q:'Which OSI layer is responsible for framing?',opts:['Physical','Data Link','Network','Transport'],ans:1,explain:'Data Link Layer مسؤولة عن التأطير (framing) — تقسيم البيانات إلى إطارات frames.'},
  {id:37,ch:'CH2',q:'Which OSI layer is responsible for logical addressing?',opts:['Physical','Data Link','Network','Transport'],ans:2,explain:'Network Layer مسؤولة عن العنونة المنطقية (IP addressing).'},
  {id:38,ch:'CH2',q:'Which OSI layer is responsible for physical addressing?',opts:['Data Link','Network','Transport','Application'],ans:0,explain:'Data Link Layer مسؤولة عن العنونة الفيزيائية (MAC address).'},
  {id:39,ch:'CH2',q:'A repeater works at:',opts:['Layer 1','Layer 2','Layer 3','Layer 4'],ans:0,explain:'Repeater = Layer 1 (Physical). Bridge = Layer 2. Router = Layer 3.'},
  {id:40,ch:'CH2',q:'A bridge works at:',opts:['Layer 1','Layer 2','Layer 3','Layer 4'],ans:1,explain:'Bridge = Layer 2 (Data Link). يستخدم MAC addresses للتوجيه.'},
  {id:41,ch:'CH2',q:'A router works at:',opts:['Layer 1','Layer 2','Layer 3','Layer 4'],ans:2,explain:'Router = Layer 3 (Network). يستخدم IP addresses للتوجيه بين الشبكات.'},
  {id:42,ch:'CH2',q:'Logical addressing belongs to:',opts:['Application Layer','Transport Layer','Data Link Layer','Network Layer'],ans:3,explain:'العنونة المنطقية (IP) تخص Network Layer.'},
  {id:43,ch:'CH2',q:'Physical addressing belongs to:',opts:['Data Link Layer','Network Layer','Transport Layer','Application Layer'],ans:0,explain:'العنونة الفيزيائية (MAC) تخص Data Link Layer.'},
  {id:44,ch:'CH2',q:'One-layer switch is a kind of:',opts:['Router','Bridge','Repeater/Hub','Gateway'],ans:2,explain:'One-layer switch = Repeater أو Hub، يعمل في Layer 1.'},
  {id:45,ch:'CH2',q:'Which address is used by routers?',opts:['Physical Address','Logical Address','Port Address','None'],ans:1,explain:'الـ Routers تستخدم Logical Address (IP Address) للتوجيه بين الشبكات.'},
  {id:46,ch:'CH2',q:'Which address is used inside a LAN?',opts:['Physical Address','IP Address','Port Address','Domain Name'],ans:0,explain:'داخل الـ LAN يستخدم Physical Address (MAC Address) للتوصيل بين الأجهزة.'},
  // ═══ CHAPTER 3 — Application Layer ═══
  {id:47,ch:'CH3',q:'______ is used to transfer data between client/server using a web browser.',opts:['HTTP','FTP','HTTPS','None of the above'],ans:0,explain:'HTTP = HyperText Transfer Protocol، يُستخدم لنقل صفحات الويب عبر المتصفح.'},
  {id:48,ch:'CH3',q:'In a ______ name space, a name is assigned to an address as a sequence of characters without structure.',opts:['Flat','Hierarchical','Organized','None of the above'],ans:0,explain:'Flat name space = الاسم بدون هيكل أو تسلسل هرمي. كل الأسماء في نفس المستوى.'},
  {id:49,ch:'CH3',q:'If a label is terminated by a null string, it is called:',opts:['PQDN','FQDN','SQDN','None of the above'],ans:1,explain:'FQDN = Fully Qualified Domain Name. ينتهي بنقطة تمثل الـ root (null string).'},
  {id:50,ch:'CH3',q:'DNS uses the services of ______ using the well-known port 53.',opts:['UDP','TCP','UDP or TCP','None'],ans:2,explain:'DNS يستخدم UDP للاستعلامات العادية وTCP لـ Zone Transfer. كلاهما على Port 53.'},
  {id:51,ch:'CH3',q:'DNS ______ matches domain names with IP addresses.',opts:['Data Link','HTTP','DNS','None of the above'],ans:2,explain:'DNS = Domain Name System يترجم أسماء النطاقات إلى عناوين IP.'},
  {id:52,ch:'CH3',q:'If a DNS domain is "jadara.edu" — How many labels and levels of hierarchy?',opts:['Three labels and four levels','Three labels and three levels','Three labels and one level','Two labels and three levels'],ans:1,explain:'jadara.edu تحتوي على 3 labels: jadara, edu, والـ root (.) = 3 levels.'},
  {id:53,ch:'CH3',q:'The root of the DNS tree is:',opts:['63 characters string','Character string','Empty string','Root domain'],ans:2,explain:'Root of DNS = empty string (.) يمثل قمة شجرة DNS.'},
  {id:54,ch:'CH3',q:'The ports ranging from 0–1023 are called:',opts:['Dynamic','Registered','Well-known','Private'],ans:2,explain:'المنافذ 0-1023 = Well-known ports، محجوزة لبروتوكولات معروفة كـ HTTP(80), DNS(53).'},
  {id:55,ch:'CH3',q:'FTP allows:',opts:['Web browsing','Email transfer','File transfer','DNS lookup'],ans:2,explain:'FTP = File Transfer Protocol، يُستخدم لنقل الملفات بين Client و Server.'},
  {id:56,ch:'CH3',q:'DHCP is used to:',opts:['Resolve names','Assign IP addresses automatically','Transfer files','Send emails'],ans:1,explain:'DHCP = Dynamic Host Configuration Protocol، يعطي عناوين IP تلقائياً للأجهزة.'},
  {id:57,ch:'CH3',q:'DNS matches:',opts:['MAC ↔ IP','Domain Name ↔ IP Address','Port ↔ Process','URL ↔ Port'],ans:1,explain:'DNS يحول اسم النطاق (مثل google.com) إلى عنوان IP.'},
  {id:58,ch:'CH3',q:'In a flat name space:',opts:['Name has hierarchy','Name has structure','Name is sequence of characters without structure','None'],ans:2,explain:'Flat name space = الأسماء بدون هيكل هرمي، مجرد تسلسل حروف.'},
  {id:59,ch:'CH3',q:'DNS hierarchy starts from:',opts:['Local Domain','Root Domain','Primary Server','Host'],ans:1,explain:'شجرة DNS تبدأ من Root Domain (.) في الأعلى.'},
  {id:60,ch:'CH3',q:'An FQDN contains:',opts:['Complete domain path','Only host name','Only domain name','Port number'],ans:0,explain:'FQDN = المسار الكامل للـ domain من الـ host حتى الـ root.'},
  {id:61,ch:'CH3',q:'Which protocol translates domain names to IP addresses?',opts:['DHCP','DNS','FTP','SMTP'],ans:1,explain:'DNS = Domain Name System يقوم بترجمة الأسماء إلى IPs.'},
  {id:62,ch:'CH3',q:'Which protocol is used for remote login?',opts:['FTP','Telnet','DNS','SMTP'],ans:1,explain:'Telnet يُستخدم لتسجيل الدخول عن بُعد إلى جهاز آخر. يعمل على Port 23.'},
  {id:63,ch:'CH3',q:'FTP uses:',opts:['One connection','Two connections','Three connections','Four connections'],ans:1,explain:'FTP يستخدم اتصالين: Control connection (port 21) و Data connection (port 20).'},
  {id:64,ch:'CH3',q:'FTP control connection port:',opts:['20','21','23','25'],ans:1,explain:'FTP Control Connection = Port 21. Data Connection = Port 20.'},
  {id:65,ch:'CH3',q:'FTP data connection port:',opts:['20','21','22','23'],ans:0,explain:'FTP Data Connection = Port 20. Control = Port 21.'},
  {id:66,ch:'CH3',q:'Telnet default port:',opts:['20','21','23','25'],ans:2,explain:'Telnet يعمل على Port 23. يتيح remote login لكنه غير آمن.'},
  {id:67,ch:'CH3',q:'SMTP default port:',opts:['21','23','25','53'],ans:2,explain:'SMTP = Simple Mail Transfer Protocol، يعمل على Port 25 لإرسال البريد الإلكتروني.'},
  {id:68,ch:'CH3',q:'DNS default port:',opts:['21','25','53','80'],ans:2,explain:'DNS يعمل على Port 53 (UDP للاستعلامات العادية، TCP لـ Zone Transfer).'},
  {id:69,ch:'CH3',q:'HTTP default port:',opts:['25','53','80','110'],ans:2,explain:'HTTP يعمل على Port 80. HTTPS يعمل على Port 443.'},
  {id:70,ch:'CH3',q:'Which protocol is used by DNS most of the time?',opts:['TCP','UDP','FTP','SMTP'],ans:1,explain:'DNS يستخدم UDP معظم الوقت لأنه أسرع وأخف. يستخدم TCP فقط في Zone Transfer.'},
  {id:71,ch:'CH3',q:'FTP uses port:',opts:['20 & 21','25','53','80'],ans:0,explain:'FTP يستخدم منفذين: 20 للبيانات و 21 للتحكم.'},
  {id:72,ch:'CH3',q:'SMTP is used for:',opts:['Sending Email','Receiving Email','Routing','DNS'],ans:0,explain:'SMTP = Simple Mail Transfer Protocol لإرسال البريد الإلكتروني. POP3/IMAP للاستقبال.'},
  {id:73,ch:'CH3',q:'POP3 is used for:',opts:['Downloading Email','Sending Email','Routing','DNS'],ans:0,explain:'POP3 = Post Office Protocol 3 لتحميل البريد الإلكتروني من الخادم.'},
  {id:74,ch:'CH3',q:'DHCP dynamically assigns:',opts:['Port Numbers','MAC Addresses','IP Addresses','Domain Names'],ans:2,explain:'DHCP يعطي IP addresses تلقائياً للأجهزة عند اتصالها بالشبكة.'},
  {id:75,ch:'CH3',q:'Telnet is mainly used for:',opts:['Remote Login','Email','DNS','FTP'],ans:0,explain:'Telnet = remote login، يسمح بالتحكم في جهاز آخر عن بُعد.'},
  {id:76,ch:'CH3',q:'DHCP stands for:',opts:['Dynamic Host Configuration Protocol','Data Host Communication Protocol','Dynamic Hyper Configuration Protocol','None'],ans:0,explain:'DHCP = Dynamic Host Configuration Protocol، يُعين IP تلقائياً.'},
  {id:77,ch:'CH3',q:'The maximum length of one DNS label is:',opts:['32','63','128','255'],ans:1,explain:'الـ label في DNS محدود بـ 63 حرفاً. الاسم الكامل محدود بـ 255 حرفاً.'},
  {id:78,ch:'CH3',q:'DNS may use TCP when:',opts:['Zone Transfer','Normal Query only','FTP Request','HTTP Request'],ans:0,explain:'DNS يستخدم TCP فقط في Zone Transfer (نقل سجلات DNS بين الخوادم).'},
  {id:79,ch:'CH3',q:'FQDN means:',opts:['Fully Qualified Domain Name','Fast Qualified Domain Name','Full Query Domain Name','Fixed Query Domain Name'],ans:0,explain:'FQDN = Fully Qualified Domain Name، الاسم الكامل والمؤهل تماماً.'},
  {id:80,ch:'CH3',q:'Which protocol belongs to Application Layer?',opts:['FTP','TCP','IP','Ethernet'],ans:0,explain:'FTP, HTTP, DNS, SMTP, DHCP, Telnet = Application Layer. TCP/UDP = Transport.'},
  // ═══ CHAPTER 4 — Transport Layer ═══
  {id:81,ch:'CH4',q:'The ______ address identifies a process on a host.',opts:['Physical','IP','Port','Specific'],ans:2,explain:'Port address يحدد العملية (البرنامج) على الجهاز. IP يحدد الجهاز. MAC يحدد الكارت.'},
  {id:82,ch:'CH4',q:'The source port address in a UDP user datagram header defines:',opts:['Transport address','Network address','Socket address','None of the above'],ans:0,explain:'Source port في UDP header تحدد عنوان النقل (Transport address) للمرسل.'},
  {id:83,ch:'CH4',q:'The host-to-host type of data delivery is in:',opts:['Data Link Layer','Network Layer','Transport Layer','None'],ans:1,explain:'Network Layer = host-to-host. Transport Layer = process-to-process.'},
  {id:84,ch:'CH4',q:'Source port number in UDP is:',opts:['16 bits','32 bits','8 bits','None'],ans:0,explain:'Source Port في UDP = 16 bits. كذلك Destination Port = 16 bits. إجمالي Header = 8 bytes.'},
  {id:85,ch:'CH4',q:'A SYN segment cannot carry data; it consumes:',opts:['One sequence number','Three','Seven','None'],ans:0,explain:'SYN يستهلك sequence number واحد حتى لو لم يحمل بيانات.'},
  {id:86,ch:'CH4',q:'One responsibility of the Transport Layer protocol is to create:',opts:['Host-to-host','Process-to-process','Node-to-node','None'],ans:1,explain:'Transport Layer = Process-to-process delivery. تتعامل مع التطبيقات (processes).'},
  {id:87,ch:'CH4',q:'In TCP, one end can stop sending data while still receiving data. This is called:',opts:['Half-close','Half-open','One-way termination','None of the above'],ans:0,explain:'Half-Close = أحد الطرفين يوقف الإرسال لكن لا يزال يستقبل. يُستخدم في إنهاء الاتصال.'},
  {id:88,ch:'CH4',q:'TCP stands for:',opts:['Transmission Control Protocol','Transfer Control Process','Transport Connection Protocol','Transmission Communication Process'],ans:0,explain:'TCP = Transmission Control Protocol، بروتوكول النقل الموثوق.'},
  {id:89,ch:'CH4',q:'UDP stands for:',opts:['User Datagram Protocol','Universal Data Protocol','User Data Process','Unified Datagram Process'],ans:0,explain:'UDP = User Datagram Protocol، بروتوكول نقل سريع لكن غير موثوق.'},
  {id:90,ch:'CH4',q:'TCP is:',opts:['Connectionless','Connection-Oriented','Broadcast','Unreliable'],ans:1,explain:'TCP = Connection-Oriented، يُنشئ اتصالاً قبل إرسال البيانات (3-way handshake).'},
  {id:91,ch:'CH4',q:'UDP is:',opts:['Connection-Oriented','Reliable','Connectionless','Sequential'],ans:2,explain:'UDP = Connectionless، يرسل البيانات مباشرة بدون إنشاء اتصال مسبق.'},
  {id:92,ch:'CH4',q:'Which protocol guarantees delivery?',opts:['UDP','TCP','IP','DNS'],ans:1,explain:'TCP يضمن التسليم عبر الـ ACK (acknowledgment) وإعادة الإرسال عند الخطأ.'},
  {id:93,ch:'CH4',q:'Which protocol has lower overhead?',opts:['TCP','UDP','FTP','HTTP'],ans:1,explain:'UDP header = 8 bytes فقط. TCP header = 20 bytes. UDP أخف وأسرع.'},
  {id:94,ch:'CH4',q:'Port numbers are found in:',opts:['Network Layer','Transport Layer','Physical Layer','Data Link Layer'],ans:1,explain:'Port numbers موجودة في Transport Layer header (TCP/UDP).'},
  {id:95,ch:'CH4',q:'A socket address consists of:',opts:['MAC + Port','IP + Port','Host + Port','URL + Port'],ans:1,explain:'Socket Address = IP Address + Port Number. يحدد عملية محددة على جهاز محدد.'},
  {id:96,ch:'CH4',q:'Sequence Number field belongs to:',opts:['UDP','TCP','IP','DNS'],ans:1,explain:'Sequence Number موجود في TCP فقط لترتيب الحزم وضمان التسليم الصحيح.'},
  {id:97,ch:'CH4',q:'ACK Number field belongs to:',opts:['TCP','UDP','DNS','FTP'],ans:0,explain:'ACK Number موجود في TCP فقط، يؤكد استلام البيانات.'},
  {id:98,ch:'CH4',q:'TCP establishes connection using:',opts:['Two-Way Handshake','Three-Way Handshake','Four-Way Handshake','Five-Way Handshake'],ans:1,explain:'TCP يُنشئ الاتصال بـ 3-Way Handshake: SYN → SYN+ACK → ACK.'},
  {id:99,ch:'CH4',q:'First segment in Three-Way Handshake:',opts:['ACK','SYN','FIN','RST'],ans:1,explain:'الخطوة 1: Client يرسل SYN. الخطوة 2: Server يرسل SYN+ACK. الخطوة 3: Client يرسل ACK.'},
  {id:100,ch:'CH4',q:'Second segment in Three-Way Handshake:',opts:['SYN+ACK','FIN','ACK','URG'],ans:0,explain:'الخطوة 2: Server يرد بـ SYN+ACK (يؤكد الاستلام ويطلب مزامنة).'},
  {id:101,ch:'CH4',q:'Third segment in Three-Way Handshake:',opts:['FIN','ACK','SYN','PSH'],ans:1,explain:'الخطوة 3: Client يرسل ACK لتأكيد الاتصال. الاتصال الآن مفتوح.'},
  {id:102,ch:'CH4',q:'FIN flag is used for:',opts:['Start connection','End connection','Reset connection','Acknowledgment'],ans:1,explain:'FIN flag = إنهاء الاتصال. مثل SYN لكن لإغلاق الاتصال.'},
  {id:103,ch:'CH4',q:'ACK flag means:',opts:['Acknowledgment','Finish','Synchronize','Reset'],ans:0,explain:'ACK = Acknowledgment، تأكيد استلام البيانات.'},
  {id:104,ch:'CH4',q:'SYN flag means:',opts:['Synchronize Sequence Numbers','Stop','Send','Segment'],ans:0,explain:'SYN = Synchronize، يُستخدم في بداية 3-Way Handshake لمزامنة الـ sequence numbers.'},
  {id:105,ch:'CH4',q:'In TCP Half-Close:',opts:['Both sides stop sending','One side stops sending but still receives','Connection is broken','Both continue normally'],ans:1,explain:'Half-Close = طرف واحد يُرسل FIN (يوقف الإرسال) لكن لا يزال يستقبل من الطرف الآخر.'},
  {id:106,ch:'CH4',q:'Which protocol provides Flow Control?',opts:['TCP','UDP','IP','DNS'],ans:0,explain:'TCP يوفر Flow Control عبر Window Size لمنع إغراق المستقبل بالبيانات.'},
  {id:107,ch:'CH4',q:'IP is responsible for ______ communication.',opts:['Host-to-host','Process-to-process','Node-to-node','User-to-user'],ans:0,explain:'IP (في Network Layer) = Host-to-host. TCP (في Transport) = Process-to-process.'},
  {id:108,ch:'CH4',q:'TCP is responsible for:',opts:['Process-to-process communication','Host-to-host communication','Node-to-node communication','Routing'],ans:0,explain:'TCP = Process-to-process. يحدد أي تطبيق يستقبل البيانات عبر Port number.'},
  {id:109,ch:'CH4',q:'Socket Address =',opts:['IP Address only','Port Number only','IP Address + Port Number','MAC Address + Port'],ans:2,explain:'Socket = IP Address + Port Number = عنوان فريد لعملية على جهاز معين.'},

// ── STATE ──
let state = {}; // {qId: 'correct'|'wrong'}
let displayedIds = QUESTIONS.map(q=>q.id);
let currentFilter = 'all';
let currentChapter = 'all';
let currentSearch = '';

function getQ(id){ return QUESTIONS.find(q=>q.id===id); }

// ── RENDER ──
function render(){
  const wrap = document.getElementById('questionsWrap');
  let filtered = QUESTIONS.filter(q=>{
    let show = true;
    if(currentChapter!=='all') show = show && q.ch===currentChapter;
    if(currentSearch) show = show && q.q.toLowerCase().includes(currentSearch.toLowerCase());
    if(currentFilter==='wrong') show = show && state[q.id]==='wrong';
    if(currentFilter==='correct') show = show && state[q.id]==='correct';
    if(currentFilter==='unanswered') show = show && !state[q.id];
    return show;
  });

  if(!filtered.length){
    wrap.innerHTML=`<div class="empty-state"><div class="big">🔍</div><p>لا توجد أسئلة تطابق البحث</p></div>`;
    return;
  }

  wrap.innerHTML = filtered.map((q,i)=>buildCard(q,i)).join('');
  updateScore();
}

function buildCard(q, idx){
  const answered = state[q.id];
  const cardClass = answered==='correct'?'answered-correct':answered==='wrong'?'answered-wrong':'';
  const numClass = answered==='correct'?'correct-num':answered==='wrong'?'wrong-num':'';
  const chLabel = {CH1:'Ch.1 — Intro',CH2:'Ch.2 — TCP/OSI',CH3:'Ch.3 — App Layer',CH4:'Ch.4 — Transport',CH5:'Ch.5 — IPv4',CH6:'Ch.6 — Access'}[q.ch];

  const opts = q.opts.map((o,i)=>{
    let cls='option';
    if(answered){
      cls+=' disabled';
      if(i===q.ans) cls+=' correct-opt';
      else if(answered==='wrong' && i===q._selected) cls+=' wrong-opt';
    }
    return `<div class="${cls}" ${!answered?`onclick="answer(${q.id},${i})"`:''}><span class="option-letter">${'ABCD'[i]}</span>${o}</div>`;
  }).join('');

  let fbHtml='';
  if(answered){
    const isC=answered==='correct';
    fbHtml=`<div class="feedback ${isC?'correct-fb':'wrong-fb'} show">
      <div class="fb-header ${isC?'fb-correct-head':'fb-wrong-head'}">${isC?'✅ إجابة صحيحة! 🎉':'❌ إجابة خاطئة'}</div>
      ${!isC?`<div class="fb-correct-ans">✅ الإجابة الصحيحة: ${q.opts[q.ans]}</div>`:''}
      <div class="fb-explain" style="margin-top:8px;font-size:13px">${q.explain}</div>
    </div>`;
  }

  return `<div class="q-card ${cardClass}" id="qcard-${q.id}" style="animation-delay:${Math.min(idx,15)*40}ms">
    <div class="q-header">
      <div class="q-num ${numClass}">${q.id}</div>
      <div style="flex:1">
        <span class="q-chapter-tag">${chLabel}</span>
        <div class="q-text">${q.q}</div>
      </div>
    </div>
    <div class="options">${opts}</div>
    ${fbHtml}
  </div>`;
}

function answer(qId, optIdx){
  const q = getQ(qId);
  q._selected = optIdx;
  const correct = optIdx===q.ans;
  state[qId] = correct?'correct':'wrong';
  updateScore();
  // Re-render just this card
  const card = document.getElementById('qcard-'+qId);
  const cardClass = correct?'answered-correct':'answered-wrong';
  card.className='q-card '+cardClass;
  card.innerHTML=buildCard(q,0).replace(/<div class="q-card[^"]*"[^>]*>/,'').replace(/<\/div>\s*$/,'');
  // Re-render full card
  const tmp=document.createElement('div');
  tmp.innerHTML=buildCard(q,0);
  card.replaceWith(tmp.firstElementChild);
}

// ── SCORE ──
function updateScore(){
  const total=QUESTIONS.length;
  const correct=Object.values(state).filter(v=>v==='correct').length;
  const wrong=Object.values(state).filter(v=>v==='wrong').length;
  const answered=correct+wrong;
  const skip=total-answered;
  const pct=answered?Math.round(correct/answered*100):0;

  document.getElementById('countCorrect').textContent=correct;
  document.getElementById('countWrong').textContent=wrong;
  document.getElementById('countSkip').textContent=skip;
  document.getElementById('countTotal').textContent=total;
  document.getElementById('scorePct').textContent=pct+'%';
  document.getElementById('progFill').style.width=(answered/total*100)+'%';
  document.getElementById('msC').textContent=correct;
  document.getElementById('msW').textContent=wrong;
  document.getElementById('msT').textContent=total;

  // Ring
  const circ=283;
  const offset=circ-(pct/100*circ);
  document.getElementById('ringFill').style.strokeDashoffset=offset;
  const ringColor=pct>=80?'var(--green)':pct>=60?'var(--accent)':pct>=40?'var(--gold)':'var(--red)';
  document.getElementById('ringFill').style.stroke=ringColor;
}

// ── FILTERS ──
function filterCat(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function filterChapter(val){currentChapter=val;render();}
function searchQ(val){currentSearch=val;render();}

// ── RESET ──
function resetAll(){
  QUESTIONS.forEach(q=>{delete q._selected});
  state={};
  render();
}

// ── SHUFFLE ──
function shuffleQuestions(){
  for(let i=QUESTIONS.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [QUESTIONS[i],QUESTIONS[j]]=[QUESTIONS[j],QUESTIONS[i]];
  }
  render();
}

// ── MODAL ──
function showResults(){
  const total=QUESTIONS.length;
  const correct=Object.values(state).filter(v=>v==='correct').length;
  const wrong=Object.values(state).filter(v=>v==='wrong').length;
  const skip=total-correct-wrong;
  const pct=correct+wrong?Math.round(correct/(correct+wrong)*100):0;

  document.getElementById('mCorrect').textContent=correct;
  document.getElementById('mWrong').textContent=wrong;
  document.getElementById('mSkip').textContent=skip;

  let grade,emoji,msg;
  if(pct>=90){grade='A+';emoji='🏆';msg='ممتاز جداً! أنت مستعد للامتحان بكل ثقة 💪';}
  else if(pct>=80){grade='A';emoji='🎯';msg='ممتاز! أداء رائع، راجع الأخطاء البسيطة.';}
  else if(pct>=70){grade='B';emoji='👍';msg='جيد جداً! راجع الأسئلة الغلط وستحقق أفضل.';}
  else if(pct>=60){grade='C';emoji='📚';msg='جيد، لكن تحتاج مراجعة أكثر للفصول الضعيفة.';}
  else{grade='D';emoji='💡';msg='تحتاج مراجعة أقوى للمادة. راجع الأسئلة الغلط.';}

  document.getElementById('modalGrade').textContent=pct+'%';
  document.getElementById('modalGrade').className='grade '+grade[0];
  document.getElementById('modalEmoji').textContent=emoji;
  document.getElementById('modalMsg').textContent=msg;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

// ── INIT ──
render();
updateScore();
</script>
</body>
</html>
